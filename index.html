<style>
#cvbar-wrap * { margin:0; padding:0; box-sizing:border-box; }
#cvbar-wrap {
  position:relative; width:100%; height:90px; overflow:hidden;
  font-family:'Segoe UI',Tahoma,Arial,sans-serif;
  background:#7D1025;
  box-shadow:0 3px 14px rgba(0,0,0,0.25);
}
#cvbar-top {
  position:absolute; top:0; left:0; right:0; height:4px;
  background:rgba(255,255,255,0.45); z-index:5;
}
#cvbar-progress {
  position:absolute; bottom:0; left:0; height:3px;
  background:rgba(255,255,255,0.55); width:0%; z-index:5;
}
.cvbar-slide {
  position:absolute; top:0; bottom:0; left:0; right:155px;
  display:flex; align-items:center; padding:0 10px 0 48px; gap:16px;
  opacity:0; transform:translateX(30px);
  transition:opacity 0.5s ease, transform 0.5s ease;
  pointer-events:none;
}
.cvbar-slide.active { opacity:1; transform:translateX(0); pointer-events:auto; }
.cvbar-slide.exit   { opacity:0; transform:translateX(-30px); }
.cvbar-badge {
  flex-shrink:0; height:70px; width:auto; display:block; object-fit:contain;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,0.40));
}
.cvbar-copy { flex:1; min-width:0; }
.cvbar-label {
  display:block; font-size:10px; font-weight:700;
  letter-spacing:0.18em; text-transform:uppercase;
  color:rgba(255,255,255,0.70); margin-bottom:5px;
}
.cvbar-title {
  display:block; font-size:18px; font-weight:900; color:#ffffff;
  text-transform:uppercase; letter-spacing:0.04em; line-height:1.2;
  text-shadow:0 1px 5px rgba(0,0,0,0.35);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#cvbar-prev {
  position:absolute; left:8px; top:50%; transform:translateY(-50%); z-index:10;
  width:30px; height:30px; border-radius:50%;
  border:2px solid rgba(255,255,255,0.50); background:rgba(255,255,255,0.12);
  color:#ffffff; font-size:14px; cursor:pointer; line-height:1;
  display:flex; align-items:center; justify-content:center;
}
#cvbar-prev:hover { background:rgba(255,255,255,0.28); }
#cvbar-logo {
  position:absolute; top:0; right:0; bottom:0; width:155px; z-index:10;
  background:#ffffff; border-left:3px solid rgba(0,0,0,0.12);
  display:flex; align-items:center; justify-content:center; padding:8px 12px;
}
#cvbar-logo img { max-width:100%; max-height:64px; display:block; object-fit:contain; }
#cvbar-dots {
  position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
  display:flex; gap:6px; z-index:10;
}
.cvbar-dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(255,255,255,0.38); border:none; cursor:pointer; padding:0;
  transition:background 0.3s, transform 0.3s;
}
.cvbar-dot.active { background:#ffffff; transform:scale(1.5); }
</style>

<script>
(function() {
  var INTERVAL = 5000;
  var wrap     = document.getElementById('cvbar-wrap');
  var prog     = document.getElementById('cvbar-progress');
  var dotsEl   = document.getElementById('cvbar-dots');
  var slides   = wrap.getElementsByClassName('cvbar-slide');
  var current  = 0;
  var timer    = null;
  var progTimer= null;

  for (var i = 0; i < slides.length; i++) {
    (function(idx) {
      var d = document.createElement('button');
      d.className = 'cvbar-dot' + (idx === 0 ? ' active' : '');
      d.setAttribute('aria-label', 'Anuncio ' + (idx + 1));
      d.onclick = function() { goTo(idx); startAuto(); };
      dotsEl.appendChild(d);
    })(i);
  }

  function goTo(n) {
    var dots = dotsEl.getElementsByClassName('cvbar-dot');
    var prev = current;
    current  = (n + slides.length) % slides.length;

    slides[prev].className = 'cvbar-slide exit';
    (function(p) {
      setTimeout(function() { slides[p].className = 'cvbar-slide'; }, 600);
    })(prev);

    slides[current].className = 'cvbar-slide active';

    var color = slides[current].getAttribute('data-color');
    if (color) { wrap.style.background = color; }

    dots[prev].className = 'cvbar-dot';
    dots[current].className = 'cvbar-dot active';

    resetProg();
  }

  function resetProg() {
    clearTimeout(progTimer);
    prog.style.transition = 'none';
    prog.style.width = '0%';
    progTimer = setTimeout(function() {
      prog.style.transition = 'width ' + INTERVAL + 'ms linear';
      prog.style.width = '100%';
    }, 40);
  }

  function startAuto() {
    clearInterval(timer);
    timer = setInterval(function() { goTo(current + 1); }, INTERVAL);
  }

  document.getElementById('cvbar-prev').onclick = function() {
    goTo(current - 1); startAuto();
  };

  wrap.onmouseenter = function() {
    clearInterval(timer); clearTimeout(progTimer);
  };
  wrap.onmouseleave = function() { startAuto(); resetProg(); };

  resetProg();
  startAuto();
})();
</script>
